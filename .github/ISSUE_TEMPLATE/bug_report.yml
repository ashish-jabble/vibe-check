name: 🐛 Issue Report
description: Something is not functioning properly
labels: ["bug", "needs-triage"]
body:
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have reviewed the current issues, and this has not been reported.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Fullstack
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Clearly and concisely describe the bug. Be sure to include any error messages that you have encountered.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Procedures to replicate
      placeholder: |
        1. Execute the command '...' or click on '...'
        2. Monitor the behavior '...'
        3. Identify the error or unanticipated outcome
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What were your expectations regarding the outcome? Please outline the appropriate behavior.
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Logs / Screenshots
      description: Necessary for UI issues. Please attach pertinent logs, screenshots, or error messages.
      render: shell
